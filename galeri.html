<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Anılarımız ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:#000;
color:white;
overflow:hidden;
text-align:center;
}

/* Müzik butonu */
.music-btn{
position:fixed;
top:20px;
right:20px;
background:white;
color:#ff2e63;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
z-index:10;
}

/* Slideshow */
.slideshow{
position:relative;
height:100vh;
width:100%;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

/* Yazı */
.caption{
position:absolute;
bottom:50px;
width:100%;
font-size:28px;
background:rgba(0,0,0,0.5);
padding:15px;
}

/* Final ekran */
.final{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:40px;
opacity:0;
visibility:hidden;
transition:1s;
z-index:20;
}

.final.show{
opacity:1;
visibility:visible;
}

.final button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

/* Kalpler */
.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear infinite;
opacity:0.8;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(100vh) scale(0.5);opacity:1;}
100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 Müzik</button>

<audio id="bgMusic" loop>
<source src="muzik.mp3" type="audio/mpeg">
</audio>

<div class="slideshow">

<div class="slide active">
<img src="1.JPG">
<div class="caption">Seninle başlayan en güzel hikaye ❤️</div>
</div>

<div class="slide">
<img src="2.JPG">
<div class="caption">Her anım seninle anlamlı 💕</div>
</div>

<div class="slide">
<img src="3.JPG">
<div class="caption">Gülüşün dünyamı aydınlatıyor ✨</div>
</div>

<div class="slide">
<img src="4.JPG">
<div class="caption">Kalbim sadece sana ait 💖</div>
</div>

<div class="slide">
<img src="5.jpg">
<div class="caption">Sonsuza kadar sen 💍 (Buna tıklayınca sürpriz)</div>
</div>

</div>

<div class="final" id="finalScreen">
💍 Benimle Sonsuza Kadar Var Mısın? 💖
<button onclick="closeFinal()">Geri Dön</button>
</div>

<script>
let slides=document.querySelectorAll(".slide");
let current=0;

function nextSlide(){
slides[current].classList.remove("active");
current=(current+1)%slides.length;
slides[current].classList.add("active");
}

setInterval(nextSlide,4000);

/* Son foto tıklanınca */
slides[slides.length-1].addEventListener("click",()=>{
document.getElementById("finalScreen").classList.add("show");
});

/* Final kapatma */
function closeFinal(){
document.getElementById("finalScreen").classList.remove("show");
}

/* Müzik */
let music=document.getElementById("bgMusic");
function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/* Uçan kalpler */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,500);
</script>

</body>
</html>
