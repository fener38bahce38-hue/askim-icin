<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Hikayemiz ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
text-align:center;
}

/* Arka plan */
.background{
position:fixed;
width:100%;
height:100%;
background:url("askim.jpg") center/cover no-repeat;
filter:blur(8px) brightness(0.5);
z-index:-1;
}

/* Sayaç alanı */
.counters{
position:absolute;
top:30px;
width:100%;
font-size:20px;
font-weight:bold;
line-height:1.6;
}

/* Giriş kutusu */
.container{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
width:320px;
}

h1{margin-bottom:20px;}

input{
padding:10px;
border:none;
border-radius:10px;
width:100%;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
border:none;
border-radius:20px;
background:white;
color:#ff1e56;
font-weight:bold;
cursor:pointer;
width:100%;
}

button:hover{transform:scale(1.05);}

.shake{animation:shake 0.3s;}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="background"></div>

<!-- 💖 Sayaçlar -->
<div class="counters">
<div id="forwardCounter">💞 Birlikte Geçen Süre: Hesaplanıyor...</div>
<div id="countdown">⏳ Özel Güne Kalan Süre: Hesaplanıyor...</div>
</div>

<div class="container" id="box">
<h1>❤️ Gizli Alan ❤️</h1>
<p>Şifreyi gir aşkım 💖</p>
<input type="password" id="password" placeholder="Şifre">
<button onclick="checkPassword()">Giriş Yap</button>
</div>

<script>

/* 💞 Tanışma tarihi */
const startDate = new Date("2025-10-26T00:00:00");

/* 💍 Özel gün tarihi (yıldönümü vs) */
const specialDate = new Date("2025-10-26T00:00:00");

function updateTimers(){

const now = new Date();

/* İLERİ SAYIM */
const diffForward = now - startDate;

const d1 = Math.floor(diffForward / (1000*60*60*24));
const h1 = Math.floor((diffForward / (1000*60*60)) % 24);
const m1 = Math.floor((diffForward / (1000*60)) % 60);
const s1 = Math.floor((diffForward / 1000) % 60);

document.getElementById("forwardCounter").innerHTML =
`💞 Birlikte ${d1} Gün ${h1} Saat ${m1} Dakika ${s1} Saniye`;


/* GERİ SAYIM */
const diffCountdown = specialDate - now;

if(diffCountdown > 0){

const d2 = Math.floor(diffCountdown / (1000*60*60*24));
const h2 = Math.floor((diffCountdown / (1000*60*60)) % 24);
const m2 = Math.floor((diffCountdown / (1000*60)) % 60);
const s2 = Math.floor((diffCountdown / 1000) % 60);

document.getElementById("countdown").innerHTML =
`⏳ Özel Güne ${d2} Gün ${h2} Saat ${m2} Dakika ${s2} Saniye Kaldı 💖`;

}else{
document.getElementById("countdown").innerHTML =
"🎉 BUGÜN ÖZEL GÜNÜMÜZ! SENİ ÇOK SEVİYORUM ❤️";
}

}

setInterval(updateTimers,1000);
updateTimers();


/* Şifre */
function checkPassword(){
const pass=document.getElementById("password").value;
const box=document.getElementById("box");

if(pass==="26102025"){
window.location.href="galeri.html";
}else{
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
}
}
</script>

</body>
</html>
