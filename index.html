!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gizli Giriş ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#111;
color:white;
text-align:center;
}

/* Sayaç */
#counter{
font-size:22px;
margin-bottom:40px;
}

/* Giriş kutusu */
.box{
background:#222;
padding:30px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff2e63;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔥 İLERİ SAYAN SAYAÇ -->
<div id="counter">
Birlikte Geçen Süre: Hesaplanıyor...
</div>

<div class="box">
<h2>Şifreyi Gir ❤️</h2>
<input type="password" id="password" placeholder="Şifre">
<button onclick="checkPassword()">Giriş</button>
<div class="error" id="error"></div>
</div>

<script>

/* 💞 Tanışma tarihi burayı değiştir */
const startDate = new Date("2024-01-01T00:00:00");

function updateCounter(){
const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const minutes = Math.floor((diff / (1000*60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);

document.getElementById("counter").innerHTML =
`💞 ${days} Gün ${hours} Saat ${minutes} Dakika ${seconds} Saniye`;
}

setInterval(updateCounter,1000);
updateCounter();

/* 🔐 Şifre kontrol */
function checkPassword(){
const pass = document.getElementById("password").value;

if(pass === "26102025"){
window.location.href = "galeri.html";
}else{
document.getElementById("error").innerText = "Yanlış şifre!";
}
}

</script>
<script>

/* 💖 Renkli uçan kalpler */
function createHeart(){
const heart = document.createElement("div");
heart.innerHTML = "❤";
heart.style.position = "fixed";
heart.style.left = Math.random()*100 + "vw";
heart.style.bottom = "-20px";
heart.style.fontSize = (Math.random()*20+15) + "px";
heart.style.animation = "floatUp 6s linear";
heart.style.color = `hsl(${Math.random()*360}, 100%, 60%)`;
heart.style.pointerEvents = "none";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,400);

/* Animasyon */
const style = document.createElement('style');
style.innerHTML = `
@keyframes floatUp{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-110vh); opacity:0;}
}`;
document.head.appendChild(style);

</script>
</body>
</html>
