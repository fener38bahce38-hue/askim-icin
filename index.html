<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Hikayemiz ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#ff4e8a,#ff1e56,#ff7aa2);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    text-align:center;
}

/* Kalp animasyon */
.heart{
    position:absolute;
    font-size:20px;
    animation: floatUp 6s linear infinite;
    opacity:0.8;
}

@keyframes floatUp{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

/* Cam efekt kutu */
.container{
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

h1{
    font-size:45px;
    margin-bottom:20px;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

#counter{
    font-size:22px;
    margin-bottom:20px;
}

.love-text{
    font-size:20px;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff1e56;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ffe3ec;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Aşkım ❤️</h1>
    <div id="counter"></div>
    <div class="love-text">Seni her şeyden çok seviyorum 💖</div>
    <button onclick="alert('Sonsuza kadar seninleyim ❤️')">Sonsuza Kadar 💍</button>
</div>

<script>
// Çıkmaya başlama tarihi (26 Ekim 2025)
const startDate = new Date("2025-10-26T00:00:00");

function updateCounter(){
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("counter").innerHTML =
        `Birlikte ${days} gün ${hours} saat ${minutes} dakika ${seconds} saniye ❤️`;
}

setInterval(updateCounter,1000);
updateCounter();

// Uçan kalpler
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 15) + "px";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{ heart.remove(); },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
