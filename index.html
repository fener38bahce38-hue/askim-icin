<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Hikayemiz ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
text-align:center;
}

#intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:2rem;
background:black;
animation:fadeOut 4s forwards;
}

@keyframes fadeOut{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

.slideshow{
position:absolute;
width:100%;
height:100vh;
overflow:hidden;
z-index:-1;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
animation:fade 24s infinite;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
animation:zoom 12s infinite alternate;
}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
30%{opacity:1;}
35%{opacity:0;}
100%{opacity:0;}
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.content{
position:relative;
top:35%;
z-index:2;
}

h1{
font-size:3rem;
animation:shake 0.5s ease;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.counter{
margin-top:20px;
font-size:1.5rem;
}

.secret{
margin-top:20px;
}

.secret input{
padding:10px;
border:none;
border-radius:5px;
}

.secret button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
background:red;
color:white;
}

.footer{
position:absolute;
bottom:20px;
width:100%;
font-size:1rem;
opacity:0.8;
}
</style>
</head>

<body>

<div id="intro">
Seninle başlayan en güzel hikaye ❤️
</div>

<div class="slideshow">
<div class="slide" style="animation-delay:0s"><img src="1.JPG"></div>
<div class="slide" style="animation-delay:4s"><img src="2.JPG"></div>
<div class="slide" style="animation-delay:8s"><img src="3.JPG"></div>
<div class="slide" style="animation-delay:12s"><img src="4.JPG"></div>
<div class="slide" style="animation-delay:16s"><img src="5.JPG"></div>
<div class="slide" style="animation-delay:20s"><img src="6.JPG"></div>
</div>

<div class="content">
<h1>❤️ Aşkım ❤️</h1>

<div class="counter" id="counter"></div>

<div class="secret">
<input type="text" id="nameInput" placeholder="İsmini yaz...">
<button onclick="checkName()">Gönder</button>
</div>

<div id="hiddenMessage" style="display:none; margin-top:20px; font-size:1.2rem;">
Seni her şeyden çok seviyorum ❤️
</div>

</div>

<div class="footer">
İyi ki hayatımdasın 💖
</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const startDate = new Date("2025-10-26T00:00:00");

function updateCounter(){
const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const minutes = Math.floor((diff / (1000*60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);

document.getElementById("counter").innerHTML =
`Birlikte ${days} gün ${hours} saat ${minutes} dakika ${seconds} saniyedir ❤️`;
}

setInterval(updateCounter,1000);
updateCounter();

function checkName(){
const input = document.getElementById("nameInput").value.toLowerCase();
if(input.length > 0){
document.body.style.animation = "shake 0.5s";
document.getElementById("hiddenMessage").style.display="block";
}
}
</script>

</body>
</html>
